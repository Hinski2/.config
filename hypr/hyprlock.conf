########################################
#  JEDNOLITE CIEMNE TLO
########################################
background {
    monitor      = HDMI-A-1
    color        = rgba(8,8,8,1.0)
}

background {
    monitor      = eDP-1
    color        = rgba(8,8,8,1.0)
}

########################################
#  POLE HASŁA – białe kropki
########################################
input-field {
    monitor          = HDMI-A-1
    size             = 250, 60
    position         = 0, -200
    outline_thickness= 2
    dots_size        = 0.25
    dots_spacing     = 0.33
    ignore_empty_input = true
    font_color       = rgba(255,255,255,1.0)   # białe kropki
    inner_color      = rgba(0,0,0,0.75)
    outer_color      = rgba(255,255,255,0.25)
    placeholder_text = Password…
}

input-field {
    monitor          = eDP-1
    size             = 250, 60
    position         = 0, -200
    outline_thickness= 2
    dots_size        = 0.25
    dots_spacing     = 0.33
    ignore_empty_input = true
    fade_on_empty    = false
    font_color       = rgba(255,255,255,1.0)
    inner_color      = rgba(0,0,0,0.75)
    outer_color      = rgba(255,255,255,0.25)
    placeholder_text = Password…
}

########################################
#  ZEGAR
########################################
label {
    monitor    = HDMI-A-1
    text       = $TIME
    font_size  = 40
    color      = rgba(255,255,255,0.85)
    position   = 0, 100
    halign     = center
    valign     = center
}

label {
    monitor    = eDP-1
    text       = $TIME
    font_size  = 40
    color      = rgba(255,255,255,0.85)
    position   = 0, 100
    halign     = center
    valign     = center
}
